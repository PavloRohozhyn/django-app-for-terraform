services:
  web:
    build: ./web
    container_name: application
    volumes:
      - ./web/app:/app
      - ./web/app/staticfiles:/app/staticfiles
  nginx:
    image: nginx:latest
    container_name: web-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./web/app/staticfiles:/usr/share/nginx/html/static
    depends_on:
      - web

