services:
  web:
    build: .
    container_name: application
    restart: always
    volumes:
      - ./src:/app
      - ./entrypoint.sh:/app/entrypoint.sh
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings

  nginx:
    image: nginx:latest
    container_name: web-server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/staticfiles:/app/staticfiles
    depends_on:
      - web