services:
  web:
    build: .
    container_name: application
    restart: always
    volumes:
      - ./app:/app
      - ./app/staticfiles:/app/staticfiles
  nginx:
    image: nginx:latest
    container_name: web-server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./app/staticfiles:/usr/share/nginx/html/static
    depends_on:
      - web
